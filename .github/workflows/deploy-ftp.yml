name: Deploy Theme to FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate FTP configuration
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_FOLDER: ${{ secrets.REMOTE_FOLDER }}
        run: |
          set -euo pipefail
          [ -n "$FTP_HOST" ] || { echo "Missing FTP_HOST secret."; exit 1; }
          [ -n "$FTP_USERNAME" ] || { echo "Missing FTP_USERNAME secret."; exit 1; }
          [ -n "$FTP_PASSWORD" ] || { echo "Missing FTP_PASSWORD secret."; exit 1; }
          [ -n "$REMOTE_FOLDER" ] || { echo "Missing REMOTE_FOLDER secret."; exit 1; }

      - name: Upload files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.REMOTE_FOLDER }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/src/**
            **/.DS_Store
